<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyPeak Tablet URL Generator</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            background: #0c1422;
            color: #f0ebe2;
            font-family: Arial, sans-serif;
        }
        main {
            max-width: 980px;
            margin: 0 auto;
        }
        h1 {
            font-family: Georgia, serif;
            font-weight: 400;
            margin: 0 0 16px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }
        label {
            display: grid;
            gap: 6px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(240, 235, 226, 0.68);
        }
        input {
            border: 1px solid #2c3d5c;
            border-radius: 8px;
            background: #16223a;
            color: #f0ebe2;
            padding: 11px 12px;
            font-size: 14px;
        }
        button {
            border: 0;
            border-radius: 8px;
            background: #5eb8a8;
            color: #071410;
            padding: 12px 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
        }
        .url {
            border: 1px solid #2c3d5c;
            border-radius: 8px;
            background: #16223a;
            padding: 12px;
            overflow-wrap: anywhere;
            font-size: 13px;
        }
        .url strong {
            display: block;
            color: #d4a574;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <main>
        <h1>OxyPeak Tablet URL Generator</h1>
        <div class="controls">
            <label>
                Kiosk Page Base URL
                <input id="baseUrl" value="https://oxypeak-to-tablets-grc7htdehuhea4b5.centralus-01.azurewebsites.net/seat.html">
            </label>
            <label>
                Optional API Base URL
                <input id="apiUrl" placeholder="Leave blank when same Azure app serves API">
            </label>
            <label>
                Optional API Key
                <input id="apiKey" placeholder="KIOSK_API_KEY">
            </label>
            <label>
                Show Next Patient
                <input id="showNext" placeholder="Type 1 to enable">
            </label>
        </div>
        <button onclick="generate()">Generate 56 URLs</button>
        <div class="grid" id="results"></div>
    </main>

    <script>
        const chambers = [1, 3, 4, 6];
        const seats = Array.from({ length: 14 }, (_, i) => i + 1);

        function generate() {
            const base = document.getElementById('baseUrl').value.trim();
            const api = document.getElementById('apiUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();
            const showNext = document.getElementById('showNext').value.trim();
            const results = document.getElementById('results');
            results.innerHTML = '';

            chambers.forEach(chamber => {
                seats.forEach(seat => {
                    const url = new URL(base);
                    url.searchParams.set('chamber', String(chamber));
                    url.searchParams.set('seat', String(seat));
                    if (api) url.searchParams.set('api', api);
                    if (key) url.searchParams.set('key', key);
                    if (showNext) url.searchParams.set('showNext', showNext);

                    const item = document.createElement('div');
                    item.className = 'url';
                    item.innerHTML = `<strong>HBOT Suite ${chamber} - Seat ${seat}</strong>${url.toString()}`;
                    results.appendChild(item);
                });
            });
        }

        generate();
    </script>
</body>
</html>
