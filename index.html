<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyPeak — Chamber Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0f1c;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.16);
            --text-primary: #f0ebe2;
            --text-secondary: rgba(240, 235, 226, 0.65);
            --text-tertiary: rgba(240, 235, 226, 0.38);

            --accent-cognifit: #d4a574;
            --accent-aviv: #5eb8a8;
            --accent-youtube: #e26a5a;
            --accent-radio: #c97b5a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background:
                radial-gradient(ellipse 70% 50% at 50% -10%, rgba(94, 184, 168, 0.18), transparent 65%),
                radial-gradient(ellipse 50% 40% at 90% 100%, rgba(212, 165, 116, 0.10), transparent 60%),
                radial-gradient(ellipse 60% 50% at 0% 90%, rgba(94, 184, 168, 0.07), transparent 65%),
                var(--bg-base);
            min-height: 100vh;
            padding: 28px 24px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Subtle grain for depth */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.035;
            pointer-events: none;
            mix-blend-mode: overlay;
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 880px;
            position: relative;
            z-index: 2;
        }

        /* === HEADER === */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 6px;
        }

        .session-tag {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-aviv);
            box-shadow: 0 0 12px var(--accent-aviv);
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.45; transform: scale(0.85); }
        }

        .session-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--text-tertiary);
        }

        .clock {
            text-align: right;
            line-height: 1.1;
        }

        .clock-time {
            font-family: 'Fraunces', serif;
            font-size: 28px;
            font-weight: 300;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            font-variation-settings: "opsz" 144;
        }

        .clock-date {
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* === SPLASH === */
        .splash {
            text-align: center;
            padding: 44px 24px 40px;
            margin-bottom: 28px;
            background: linear-gradient(180deg, rgba(94, 184, 168, 0.07) 0%, rgba(94, 184, 168, 0.01) 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        .splash::before {
            content: '';
            position: absolute;
            top: -60%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 220%;
            background: radial-gradient(ellipse at center, rgba(94, 184, 168, 0.14) 0%, transparent 55%);
            pointer-events: none;
        }

        .splash::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-aviv), transparent);
            opacity: 0.5;
        }

        .splash h1 {
            font-family: 'Fraunces', serif;
            font-weight: 400;
            font-size: 64px;
            line-height: 0.95;
            letter-spacing: -0.02em;
            margin: 0;
            position: relative;
            font-variation-settings: "opsz" 144, "SOFT" 50;
        }

        .splash h1 .accent {
            font-style: italic;
            font-weight: 300;
            color: var(--accent-aviv);
        }

        .splash .subtitle {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 24px;
            color: var(--accent-aviv);
            margin-top: 6px;
            letter-spacing: 0.01em;
            font-variation-settings: "opsz" 144;
            position: relative;
        }

        .splash p {
            margin: 16px 0 0;
            font-size: 15px;
            color: var(--text-secondary);
            letter-spacing: 0.08em;
            position: relative;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* === APP GRID === */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 24px;
        }

        .app-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 26px 26px 24px;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 162px;
            position: relative;
            overflow: hidden;
            transition: transform 0.12s ease, border-color 0.25s ease, background 0.25s ease;
            cursor: pointer;
        }

        /* Color glow per card */
        .app-card::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 60%;
            height: 100%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
            opacity: 0.18;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Bottom accent bar */
        .app-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 26px;
            right: 26px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 40%, transparent 100%);
            opacity: 0.7;
        }

        .app-card:active {
            transform: scale(0.97);
            border-color: var(--accent);
        }
        .app-card:active::before {
            opacity: 0.35;
        }

        .app-icon {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--accent);
            position: relative;
            z-index: 1;
        }

        .app-icon svg {
            width: 28px;
            height: 28px;
        }

        .app-text {
            position: relative;
            z-index: 1;
        }

        .app-name {
            font-family: 'Fraunces', serif;
            font-size: 30px;
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1;
            font-variation-settings: "opsz" 144;
        }

        .app-tagline {
            font-size: 12px;
            color: var(--text-tertiary);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 6px;
            font-weight: 500;
        }

        .card-cognifit { --accent: var(--accent-cognifit); }
        .card-aviv     { --accent: var(--accent-aviv); }
        .card-youtube  { --accent: var(--accent-youtube); }
        .card-radio    { --accent: var(--accent-radio); }

        /* === VOLUME === */
        .volume {
            background: linear-gradient(180deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 18px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 18px;
            align-items: center;
        }

        .vol-btn {
            width: 76px;
            height: 76px;
            border-radius: 16px;
            border: 1px solid var(--border-strong);
            background: rgba(255,255,255,0.04);
            color: var(--text-primary);
            font-size: 36px;
            font-weight: 300;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.08s ease, background 0.2s ease, border-color 0.2s ease;
            font-family: 'Fraunces', serif;
            line-height: 1;
            padding: 0;
        }

        .vol-btn:active {
            transform: scale(0.92);
            background: rgba(94, 184, 168, 0.12);
            border-color: var(--accent-aviv);
        }

        .vol-display {
            text-align: center;
            padding: 4px 0;
        }

        .vol-label {
            font-size: 10px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .vol-bar {
            display: flex;
            gap: 5px;
            justify-content: center;
            height: 26px;
            align-items: flex-end;
        }

        .vol-segment {
            width: 7px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            transition: background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .vol-segment.active {
            background: var(--accent-aviv);
            box-shadow: 0 0 6px rgba(94, 184, 168, 0.5);
        }

        /* Top quarter glows warm */
        .vol-segment.active.high {
            background: var(--accent-cognifit);
            box-shadow: 0 0 8px rgba(212, 165, 116, 0.55);
        }

        .vol-value {
            font-family: 'Fraunces', serif;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 10px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.08em;
        }

        /* Press feedback flash */
        @keyframes flash {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .vol-segment.flash { animation: flash 0.25s ease; }

        /* === RESPONSIVE === */
        @media (max-width: 820px) {
            .splash h1 { font-size: 52px; }
            .app-name { font-size: 26px; }
            .vol-btn { width: 68px; height: 68px; font-size: 32px; }
            .app-card { min-height: 148px; padding: 22px; }
        }

        @media (max-height: 720px) {
            body { padding-top: 16px; }
            .splash { padding: 28px 24px 24px; margin-bottom: 18px; }
            .splash h1 { font-size: 48px; }
            .grid { gap: 14px; margin-bottom: 16px; }
            .app-card { min-height: 130px; padding: 20px; }
            .top-bar { margin-bottom: 14px; }
        }

        /* Staggered entrance */
        .splash, .grid > *, .volume {
            opacity: 0;
            transform: translateY(8px);
            animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .splash         { animation-delay: 0.05s; }
        .grid > :nth-child(1) { animation-delay: 0.18s; }
        .grid > :nth-child(2) { animation-delay: 0.26s; }
        .grid > :nth-child(3) { animation-delay: 0.34s; }
        .grid > :nth-child(4) { animation-delay: 0.42s; }
        .volume         { animation-delay: 0.52s; }

        @keyframes rise {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="top-bar">
            <div class="session-tag">
                <div class="pulse-dot"></div>
                <div class="session-label">Session · Active</div>
            </div>
            <div class="clock">
                <div class="clock-time" id="clockTime">—:—</div>
                <div class="clock-date" id="clockDate">—</div>
            </div>
        </div>

        <div class="splash">
            <h1>OxyPeak</h1>
            <div class="subtitle">Longevity Institute</div>
            <p>Welcome to your Hyperbaric session</p>
        </div>

        <div class="grid">

            <a href="https://www.cognifit.com" class="app-card card-cognifit">
                <div class="app-icon">
                    <!-- Neural network nodes -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="6" y2="12"/>
                        <line x1="12" y1="5" x2="18" y2="12"/>
                        <line x1="6" y1="12" x2="12" y2="19"/>
                        <line x1="18" y1="12" x2="12" y2="19"/>
                        <line x1="6" y1="12" x2="18" y2="12"/>
                        <circle cx="12" cy="5" r="2" fill="currentColor"/>
                        <circle cx="6" cy="12" r="2" fill="currentColor"/>
                        <circle cx="18" cy="12" r="2" fill="currentColor"/>
                        <circle cx="12" cy="19" r="2" fill="currentColor"/>
                    </svg>
                </div>
                <div class="app-text">
                    <div class="app-name">CogniFit</div>
                    <div class="app-tagline">Cognitive Training</div>
                </div>
            </a>

            <a href="https://aviv-clinics.com" class="app-card card-aviv">
                <div class="app-icon">
                    <!-- Oxygen droplet -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2.5C12 2.5 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12.5-7-12.5z"/>
                        <path d="M9 15a3 3 0 0 0 3 3" opacity="0.5"/>
                    </svg>
                </div>
                <div class="app-text">
                    <div class="app-name">OxyPeak</div>
                    <div class="app-tagline">Longevity Institute</div>
                </div>
            </a>

            <a href="https://www.youtube.com" class="app-card card-youtube">
                <div class="app-icon">
                    <!-- Play -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
                        <path d="M8 5.5v13l11-6.5z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="app-text">
                    <div class="app-name">YouTube</div>
                    <div class="app-tagline">Videos &amp; Streaming</div>
                </div>
            </a>

            <a href="https://www.iheart.com" target="_blank" class="app-card card-radio">
                <div class="app-icon">
                    <!-- Broadcast waves -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
                        <path d="M8.5 8.5a5 5 0 0 0 0 7"/>
                        <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
                        <path d="M5.5 5.5a9 9 0 0 0 0 13"/>
                        <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
                    </svg>
                </div>
                <div class="app-text">
                    <div class="app-name">Radio</div>
                    <div class="app-tagline">iHeartRadio</div>
                </div>
            </a>

        </div>

        <div class="volume">
            <button class="vol-btn" onclick="changeVolume(-1)" aria-label="Decrease volume">−</button>
            <div class="vol-display">
                <div class="vol-label">Device Volume</div>
                <div class="vol-bar" id="volBar"></div>
                <div class="vol-value" id="volValue">— / —</div>
            </div>
            <button class="vol-btn" onclick="changeVolume(1)" aria-label="Increase volume">+</button>
        </div>

    </div>

    <script>
        // ============================================================
        // VOLUME CONTROL — Fully Kiosk Browser
        // Stream type 3 = STREAM_MUSIC (Android)
        // ============================================================
        var STREAM = 3;
        var demoVol = 8;   // fallback used when not in Fully Kiosk
        var demoMax = 15;

        function getMaxVol() {
            if (typeof fully !== 'undefined') {
                try {
                    if (typeof fully.getAudioStreamMaxVolume === 'function') {
                        var m = parseInt(fully.getAudioStreamMaxVolume(STREAM), 10);
                        if (!isNaN(m) && m > 0) return m;
                    }
                } catch (e) {}
            }
            return demoMax;
        }

        function getCurrentVol() {
            if (typeof fully !== 'undefined') {
                try {
                    var v = parseInt(fully.getAudioVolume(STREAM), 10);
                    if (!isNaN(v) && v >= 0) return v;
                } catch (e) {}
            }
            return demoVol;
        }

        function setVol(level) {
            if (typeof fully !== 'undefined') {
                try {
                    fully.setAudioVolume(level, STREAM);
                    return true;
                } catch (e) {
                    console.error('setAudioVolume failed:', e);
                    return false;
                }
            }
            demoVol = level;
            return true;
        }

        function changeVolume(change) {
            var maxVol = getMaxVol();
            var currentVol = getCurrentVol();
            var newVol = currentVol + change;

            if (newVol < 0) newVol = 0;
            if (newVol > maxVol) newVol = maxVol;

            setVol(newVol);

            // Re-read to confirm what actually got set (defensive)
            var confirmed = getCurrentVol();
            renderVolume(confirmed, maxVol, true);
        }

        function renderVolume(level, max, flash) {
            var bar = document.getElementById('volBar');
            var value = document.getElementById('volValue');
            if (!bar || !value) return;

            // One segment per volume step, but cap visual count for layout
            var visualSegments = Math.min(max, 15);
            bar.innerHTML = '';

            for (var i = 0; i < visualSegments; i++) {
                var seg = document.createElement('div');
                seg.className = 'vol-segment';

                // Step threshold this segment represents
                var threshold = Math.ceil((i + 1) * (max / visualSegments));
                if (level >= threshold) {
                    seg.classList.add('active');
                    if (i >= Math.floor(visualSegments * 0.75)) {
                        seg.classList.add('high');
                    }
                }

                // Each segment taller than the last (visualizes "louder")
                seg.style.height = (45 + (i / (visualSegments - 1)) * 55) + '%';

                if (flash) {
                    seg.style.animationDelay = (i * 12) + 'ms';
                    seg.classList.add('flash');
                }

                bar.appendChild(seg);
            }

            value.textContent = level + ' / ' + max;
        }

        // ============================================================
        // CLOCK
        // ============================================================
        function updateClock() {
            var now = new Date();
            var h = now.getHours();
            var m = now.getMinutes();
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            var mStr = m < 10 ? '0' + m : '' + m;

            var timeEl = document.getElementById('clockTime');
            var dateEl = document.getElementById('clockDate');

            if (timeEl) timeEl.textContent = h + ':' + mStr + ' ' + ampm;

            var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            if (dateEl) {
                dateEl.textContent = days[now.getDay()] + ' · ' + months[now.getMonth()] + ' ' + now.getDate();
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', function () {
            updateClock();
            setInterval(updateClock, 20000);
            renderVolume(getCurrentVol(), getMaxVol(), false);
        });

        // Refresh volume display if the user adjusts via hardware keys
        // (Fully Kiosk doesn't fire a JS event, so re-poll on visibility/focus)
        window.addEventListener('focus', function () {
            renderVolume(getCurrentVol(), getMaxVol(), false);
        });
    </script>
</body>
</html>
