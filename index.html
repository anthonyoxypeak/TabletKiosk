<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyPeak — Chamber Dashboard</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: #0c1422;
            color: #f0ebe2;
            font-family: Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 14px 16px;
        }

        /* === TOP BAR === */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
            padding: 0 2px;
        }

        .session-tag {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #5eb8a8;
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .session-label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(240, 235, 226, 0.55);
        }

        .clock {
            text-align: right;
            line-height: 1.1;
        }

        .clock-time {
            font-size: 22px;
            font-weight: 400;
            color: #f0ebe2;
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 11px;
            color: rgba(240, 235, 226, 0.45);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* === SPLASH === */
        .splash {
            text-align: center;
            padding: 16px 20px 18px;
            background: #16223a;
            border: 1px solid #2c3d5c;
            border-radius: 14px;
            flex-shrink: 0;
        }

        .splash h1 {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-weight: 400;
            font-size: 40px;
            line-height: 1;
            letter-spacing: -0.01em;
            margin: 0;
            color: #f0ebe2;
        }

        .splash .subtitle {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-style: italic;
            font-weight: 400;
            font-size: 19px;
            color: #5eb8a8;
            margin-top: 2px;
        }

        .splash p {
            margin: 10px 0 0;
            font-size: 12px;
            color: rgba(240, 235, 226, 0.55);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* === APP GRID === */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            flex: 1;
            min-height: 0;
            margin: 12px 0;
        }

        .app-card {
            border-radius: 14px;
            padding: 18px 22px;
            text-decoration: none;
            color: #f5f0e8;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 0;
            transition: transform 0.08s ease;
            user-select: none;
            -webkit-user-select: none;
            border: 1px solid;
        }

        .app-card:active {
            transform: scale(0.97);
        }

        .app-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .app-icon svg {
            width: 30px;
            height: 30px;
        }

        .app-text {
            margin-top: 8px;
        }

        .app-name {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-size: 30px;
            font-weight: 400;
            line-height: 1;
        }

        .app-tagline {
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 6px;
            font-weight: 500;
            opacity: 0.7;
        }

        /* Solid card colors — each clearly distinct */
        .card-cognifit {
            background: #3a2d1a;
            border-color: #6b5333;
        }
        .card-cognifit .app-name { color: #efc790; }
        .card-cognifit .app-icon { background: #d4a574; color: #2a1f10; }

        .card-aviv {
            background: #173d36;
            border-color: #2e6b5f;
        }
        .card-aviv .app-name { color: #8fdcca; }
        .card-aviv .app-icon { background: #5eb8a8; color: #0c1f1c; }

        .card-youtube {
            background: #3a1f1a;
            border-color: #6b3329;
        }
        .card-youtube .app-name { color: #f29485; }
        .card-youtube .app-icon { background: #e26a5a; color: #2a120e; }

        .card-radio {
            background: #38241a;
            border-color: #6b4329;
        }
        .card-radio .app-name { color: #e4a181; }
        .card-radio .app-icon { background: #c97b5a; color: #2a150e; }

        /* === VOLUME === */
        .volume {
            background: #16223a;
            border: 1px solid #2c3d5c;
            border-radius: 14px;
            padding: 10px 14px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 16px;
            align-items: center;
            flex-shrink: 0;
        }

        .vol-btn {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            border: 1px solid #3d557a;
            background: #1d3357;
            color: #f0ebe2;
            font-size: 30px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            font-family: Roboto, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .vol-btn:active {
            background: #2a4574;
        }

        .vol-display {
            text-align: center;
        }

        .vol-label {
            font-size: 10px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(240, 235, 226, 0.5);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .vol-bar {
            display: flex;
            gap: 5px;
            justify-content: center;
            height: 22px;
            align-items: flex-end;
        }

        .vol-segment {
            width: 9px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .vol-segment.active { background: #5eb8a8; }
        .vol-segment.active.high { background: #d4a574; }

        .vol-value {
            font-size: 13px;
            color: rgba(240, 235, 226, 0.7);
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.04em;
        }

        .vol-cap-tag {
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 3px 7px;
            border-radius: 3px;
            background: rgba(212, 165, 116, 0.18);
            color: #d4a574;
            border: 1px solid rgba(212, 165, 116, 0.4);
            display: none;
            font-weight: 600;
        }

        .vol-cap-tag.show { display: inline-block; }
        .vol-cap-tag.warn {
            background: rgba(226, 106, 90, 0.2);
            color: #e26a5a;
            border-color: rgba(226, 106, 90, 0.5);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="session-tag">
            <div class="pulse-dot"></div>
            <div class="session-label">Session · Active</div>
        </div>
        <div class="clock">
            <div class="clock-time" id="clockTime">—:—</div>
            <div class="clock-date" id="clockDate">—</div>
        </div>
    </div>

    <div class="splash">
        <h1>OxyPeak</h1>
        <div class="subtitle">Longevity Institute</div>
        <p>Welcome to your Hyperbaric session</p>
    </div>

    <div class="grid">

        <a href="https://www.cognifit.com" class="app-card card-cognifit">
            <div class="app-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="6" y2="12"/>
                    <line x1="12" y1="5" x2="18" y2="12"/>
                    <line x1="6" y1="12" x2="12" y2="19"/>
                    <line x1="18" y1="12" x2="12" y2="19"/>
                    <line x1="6" y1="12" x2="18" y2="12"/>
                    <circle cx="12" cy="5" r="2.2" fill="currentColor"/>
                    <circle cx="6" cy="12" r="2.2" fill="currentColor"/>
                    <circle cx="18" cy="12" r="2.2" fill="currentColor"/>
                    <circle cx="12" cy="19" r="2.2" fill="currentColor"/>
                </svg>
            </div>
            <div class="app-text">
                <div class="app-name">CogniFit</div>
                <div class="app-tagline">Cognitive Training</div>
            </div>
        </a>

        <a href="https://aviv-clinics.com" class="app-card card-aviv">
            <div class="app-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2.5C12 2.5 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12.5-7-12.5z" fill="currentColor" fill-opacity="0.25"/>
                    <path d="M12 2.5C12 2.5 5 10 5 15a7 7 0 0 0 14 0c0-5-7-12.5-7-12.5z"/>
                </svg>
            </div>
            <div class="app-text">
                <div class="app-name">OxyPeak</div>
                <div class="app-tagline">Longevity Institute</div>
            </div>
        </a>

        <a href="https://www.youtube.com" class="app-card card-youtube">
            <div class="app-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5.5v13l11-6.5z"/>
                </svg>
            </div>
            <div class="app-text">
                <div class="app-name">YouTube</div>
                <div class="app-tagline">Videos &amp; Streaming</div>
            </div>
        </a>

        <a href="https://www.iheart.com" target="_blank" class="app-card card-radio">
            <div class="app-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="1.8" fill="currentColor"/>
                    <path d="M8.5 8.5a5 5 0 0 0 0 7"/>
                    <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
                    <path d="M5.5 5.5a9 9 0 0 0 0 13"/>
                    <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
                </svg>
            </div>
            <div class="app-text">
                <div class="app-name">Radio</div>
                <div class="app-tagline">iHeartRadio</div>
            </div>
        </a>

    </div>

    <div class="volume">
        <button class="vol-btn" onclick="changeVolume(-1)" aria-label="Decrease volume">−</button>
        <div class="vol-display">
            <div class="vol-label">Device Volume</div>
            <div class="vol-bar" id="volBar"></div>
            <div class="vol-value">
                <span id="volValue">— %</span>
                <span class="vol-cap-tag" id="volCapTag">Max</span>
            </div>
        </div>
        <button class="vol-btn" onclick="changeVolume(1)" aria-label="Increase volume">+</button>
    </div>

    <script>
        // VOLUME — Fully Kiosk uses 0–100 percent for stream 3 (music)
        var STREAM = 3;
        var MAX_VOL = 100;
        var STEP = 10;
        var demoVol = 50;

        function getCurrentVol() {
            if (typeof fully !== 'undefined') {
                try {
                    var v = parseInt(fully.getAudioVolume(STREAM), 10);
                    if (!isNaN(v) && v >= 0 && v <= 100) return v;
                } catch (e) {}
            }
            return demoVol;
        }

        function setVol(level) {
            if (typeof fully !== 'undefined') {
                try { fully.setAudioVolume(level, STREAM); return true; }
                catch (e) { return false; }
            }
            demoVol = level;
            return true;
        }

        function changeVolume(direction) {
            var current = getCurrentVol();
            var snapped = Math.round(current / STEP) * STEP;
            var target = snapped + (direction * STEP);
            if (target < 0) target = 0;
            if (target > MAX_VOL) target = MAX_VOL;

            setVol(target);
            var after = getCurrentVol();
            renderVolume(after);

            var blocked = (direction > 0) && (after === current) && (current < MAX_VOL);
            updateCapTag(after, blocked);
        }

        // Build segments once, only flip classes after that
        function buildSegments() {
            var bar = document.getElementById('volBar');
            var total = MAX_VOL / STEP;
            bar.innerHTML = '';
            for (var i = 0; i < total; i++) {
                var seg = document.createElement('div');
                seg.className = 'vol-segment';
                seg.style.height = (45 + (i / (total - 1)) * 55) + '%';
                bar.appendChild(seg);
            }
        }

        function renderVolume(level) {
            var bar = document.getElementById('volBar');
            var val = document.getElementById('volValue');
            if (!bar || !val) return;
            var total = MAX_VOL / STEP;
            if (bar.children.length !== total) buildSegments();
            for (var i = 0; i < total; i++) {
                var seg = bar.children[i];
                var threshold = (i + 1) * STEP;
                var isActive = level >= threshold;
                var isHigh = isActive && (i >= Math.floor(total * 0.75));
                seg.className = 'vol-segment'
                    + (isActive ? ' active' : '')
                    + (isHigh ? ' high' : '');
            }
            val.textContent = level + ' %';
        }

        function updateCapTag(level, justBlocked) {
            var tag = document.getElementById('volCapTag');
            if (!tag) return;
            if (justBlocked) {
                tag.textContent = 'Limit reached';
                tag.className = 'vol-cap-tag show warn';
            } else if (level >= MAX_VOL) {
                tag.textContent = 'Max';
                tag.className = 'vol-cap-tag show';
            } else {
                tag.className = 'vol-cap-tag';
            }
        }

        // CLOCK
        function updateClock() {
            var now = new Date();
            var h = now.getHours();
            var m = now.getMinutes();
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            var mStr = m < 10 ? '0' + m : '' + m;
            var t = document.getElementById('clockTime');
            var d = document.getElementById('clockDate');
            if (t) t.textContent = h + ':' + mStr + ' ' + ampm;
            var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            if (d) d.textContent = days[now.getDay()] + ' · ' + months[now.getMonth()] + ' ' + now.getDate();
        }

        // INIT
        document.addEventListener('DOMContentLoaded', function () {
            updateClock();
            setInterval(updateClock, 30000);
            var v = getCurrentVol();
            renderVolume(v);
            updateCapTag(v, false);
        });

        window.addEventListener('focus', function () {
            var v = getCurrentVol();
            renderVolume(v);
            updateCapTag(v, false);
        });
    </script>

</body>
</html>
