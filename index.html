<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber Dashboard</title>
    <style>
        body {
            background-color: #121212; 
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 95vh;
            color: white;
        }
        .splash-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background-color: #1e1e1e;
            border-radius: 15px;
            width: 100%;
            max-width: 760px; 
            border-bottom: 5px solid #8e44ad;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.3);
        }
        .splash-header h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: 2px;
        }
        .splash-header p {
            margin: 10px 0 0 0;
            font-size: 22px;
            color: #aaaaaa;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 800px;
        }
        .app-button {
            background-color: #333333;
            color: #ffffff;
            text-decoration: none;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            padding: 50px 20px;
            border-radius: 15px;
            border: 2px solid #555555;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.3);
            transition: background-color 0.2s ease;
        }
        .app-button:active {
            background-color: #555555;
            transform: scale(0.98);
        }
        /* App Button Colors */
        .btn-cognifit { border-bottom: 5px solid #8e44ad; } 
        .btn-aviv { border-bottom: 5px solid #2ecc71; } 
        .btn-youtube { border-bottom: 5px solid #e74c3c; } 
        .btn-music { border-bottom: 5px solid #f39c12; } 
        .btn-news { border-bottom: 5px solid #3498db; } 

        /* New Volume Controls CSS */
        .volume-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            width: 100%;
            max-width: 800px;
            background-color: #1e1e1e;
            padding: 20px 40px;
            border-radius: 15px;
            border: 2px solid #555;
            box-sizing: border-box;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.3);
        }
        .vol-btn {
            background-color: #555;
            color: white;
            font-size: 36px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            padding: 15px 40px;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }
        .vol-btn:active {
            background-color: #777;
            transform: scale(0.95);
        }
        .vol-label {
            font-size: 28px;
            font-weight: bold;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <div class="splash-header">
        <h1>Aviv Clinics</h1>
        <p>Welcome to your CogniFit Session</p>
    </div>

    <div class="grid-container">
        <a href="https://www.cognifit.com" class="app-button btn-cognifit">CogniFit</a>
        <a href="https://aviv-clinics.com" class="app-button btn-aviv">Aviv Clinics</a>
        <a href="https://www.youtube.com" class="app-button btn-youtube">YouTube</a>
        <a href="https://music.youtube.com" class="app-button btn-music" target="_blank">YT Music</a>
    </div>

    <div class="volume-container">
        <button class="vol-btn" onclick="changeVolume(-1)">-</button>
        <div class="vol-label">DEVICE VOLUME</div>
        <button class="vol-btn" onclick="changeVolume(1)">+</button>
    </div>

    <script>
        function changeVolume(change) {
            // Check if page is actually running inside Fully Kiosk
            if (typeof fully !== 'undefined') {
                // Stream 3 is the native Android Media/Music audio stream
                var currentVol = fully.getAudioVolume(3);
                var newVol = currentVol + change;
                
                // Prevent volume from dropping below 0
                if (newVol < 0) {
                    newVol = 0;
                }
                
                // Set the new volume level
                fully.setAudioVolume(newVol, 3);
            } else {
                alert("Volume control only works when running inside the Fully Kiosk app.");
            }
        }
    </script>

</body> 
</html>
