<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyPeak Seat Display</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: #0c1422;
            color: #f0ebe2;
            font-family: Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 14px 16px;
            height: 100vh;
        }

        /* === TOP BAR === */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
            padding: 0 2px;
        }

        .session-tag {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #5eb8a8;
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .session-label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(240, 235, 226, 0.55);
        }

        .clock {
            text-align: right;
            line-height: 1.1;
        }

        .clock-time {
            font-size: 22px;
            font-weight: 400;
            color: #f0ebe2;
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 11px;
            color: rgba(240, 235, 226, 0.45);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* === SEAT DISPLAY === */
        .seat-display {
            background: #16223a;
            border: 1px solid #2c3d5c;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        /* === SPLASH === */
        .splash {
            text-align: center;
            padding: 12px 20px;
            background: #16223a;
            border: 1px solid #2c3d5c;
            border-radius: 14px;
            flex-shrink: 0;
        }

        .splash h1 {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-weight: 400;
            font-size: 28px;
            line-height: 1;
            letter-spacing: -0.01em;
            margin: 0;
            color: #f0ebe2;
        }

        .splash .subtitle {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-style: italic;
            font-weight: 400;
            font-size: 14px;
            color: #5eb8a8;
            margin-top: 2px;
        }

        /* === SEAT INFO === */
        .seat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .chamber-info, .seat-info {
            flex: 1;
        }

        .chamber-label, .seat-label {
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(240, 235, 226, 0.55);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .chamber-name {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-size: 18px;
            font-weight: 400;
            color: #5eb8a8;
            margin: 0;
        }

        .seat-number {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-size: 28px;
            font-weight: 400;
            color: #d4a574;
            margin: 0;
        }

        .patient-name {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-size: 32px;
            font-weight: 400;
            color: #f0ebe2;
            margin: 8px 0 0;
        }

        .patient-label {
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(240, 235, 226, 0.5);
            margin-top: 6px;
        }

        .time-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 12px 0;
            font-size: 11px;
        }

        .time-block {
            text-align: center;
        }

        .time-label {
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(240, 235, 226, 0.5);
            margin-bottom: 4px;
        }

        .time-value {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-size: 20px;
            font-weight: 400;
            color: #5eb8a8;
            font-variant-numeric: tabular-nums;
        }

        .countdown-display {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-size: 32px;
            font-weight: 400;
            color: #d4a574;
            font-variant-numeric: tabular-nums;
            margin: 8px 0;
        }

        .countdown-bar {
            width: 100%;
            height: 8px;
            background: #1d3357;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #3d557a;
            margin-top: 8px;
        }

        .countdown-progress {
            height: 100%;
            background: linear-gradient(90deg, #5eb8a8, #d4a574);
            width: 50%;
            transition: width 0.5s linear;
        }

        /* === APP GRID === */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex-shrink: 0;
        }

        .app-card {
            border-radius: 14px;
            padding: 12px 16px;
            text-decoration: none;
            color: #f5f0e8;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.08s ease;
            user-select: none;
            border: 1px solid;
            min-height: 80px;
        }

        .app-card:active {
            transform: scale(0.97);
        }

        .app-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .app-icon svg {
            width: 20px;
            height: 20px;
        }

        .app-name {
            font-family: "Noto Serif", Georgia, "Times New Roman", serif;
            font-size: 16px;
            font-weight: 400;
            line-height: 1;
            margin-top: 6px;
        }

        .app-tagline {
            font-size: 8px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 4px;
            font-weight: 500;
            opacity: 0.7;
        }

        .card-cognifit {
            background: #3a2d1a;
            border-color: #6b5333;
        }
        .card-cognifit .app-name { color: #efc790; }
        .card-cognifit .app-icon { background: #d4a574; color: #2a1f10; }

        .card-aviv {
            background: #173d36;
            border-color: #2e6b5f;
        }
        .card-aviv .app-name { color: #8fdcca; }
        .card-aviv .app-icon { background: #5eb8a8; color: #0c1f1c; }

        .card-youtube {
            background: #3a1f1a;
            border-color: #6b3329;
        }
        .card-youtube .app-name { color: #f29485; }
        .card-youtube .app-icon { background: #e26a5a; color: #2a120e; }

        .card-radio {
            background: #38241a;
            border-color: #6b4329;
        }
        .card-radio .app-name { color: #e4a181; }
        .card-radio .app-icon { background: #c97b5a; color: #2a150e; }

        /* === VOLUME === */
        .volume {
            background: #16223a;
            border: 1px solid #2c3d5c;
            border-radius: 14px;
            padding: 8px 12px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .vol-btn {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            border: 1px solid #3d557a;
            background: #1d3357;
            color: #f0ebe2;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
            font-family: Roboto, Arial, sans-serif;
            user-select: none;
        }

        .vol-btn:active {
            background: #2a4574;
        }

        .vol-display {
            text-align: center;
        }

        .vol-label {
            font-size: 8px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(240, 235, 226, 0.5);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .vol-bar {
            display: flex;
            gap: 3px;
            justify-content: center;
            height: 16px;
            align-items: flex-end;
        }

        .vol-segment {
            width: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .vol-segment.active { background: #5eb8a8; }
        .vol-segment.active.high { background: #d4a574; }

        .vol-value {
            font-size: 10px;
            color: rgba(240, 235, 226, 0.7);
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div class="top-bar">

    <div class="grid">

                    <circle cx="12" cy="12" r="1.8" fill="currentColor"/><path d="M8.5 8.5a5 5 0 0 0 0 7"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M5.5 5.5a9 9 0 0 0 0 13"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/>

    <div class="volume">
        <button class="vol-btn" onclick="changeVolume(-1)" aria-label="Decrease volume">−</button>
        <div class="vol-display">
            <div class="vol-label">Device Volume</div>
            <div class="vol-bar" id="volBar"></div>
            <div class="vol-value">
                <span id="volValue">— %</span>
            </div>

        <button class="vol-btn" onclick="changeVolume(1)" aria-label="Increase volume">+</button>

    <script>
        // ====== CONFIGURATION FROM URL ======
        // Read from URL: seat.html?chamber=1&seat=3&token=xyz
        const urlParams = new URLSearchParams(window.location.search);
        const CHAMBER_NUMBER = parseInt(urlParams.get('chamber')) || 1;
        const SEAT_NUMBER = parseInt(urlParams.get('seat')) || 1;
        const TOKEN_FROM_URL = urlParams.get('token');
        
        // ====== API & STATE ======
        const DR_CHRONO_API_URL = 'https://oxypeak-to-tablets-grc7htdehuhea4b5.centralus-01.azurewebsites.net';
        const CHAMBER_NAMES = {
            1: 'HBOT Suite 1',
            3: 'HBOT Suite 3',
            4: 'HBOT Suite 4',
            6: 'HBOT Suite 6'
        };
        const DIVE_DURATION_MS = 2 * 60 * 60 * 1000; // 2 hours in milliseconds

        // ====== OAUTH CONFIG FOR TOKEN REFRESH ======
        const OAUTH_CLIENT_ID = 'FKTFgvWy0Pr41RRHI0Hm9jT9eATKdosujH8LaAMx';
        const OAUTH_CLIENT_SECRET = 'Hmvxiqzf905LkauminzkThl2tlJ7o5diasTnDUfXjWSomsUW69VPQEYR559mVFmLvTZDD7r8zZfZN2LigjA3IoTcSWCMO9wcGvVfXLlIEdisx00ErOgAA5Ek3TYcLtdp';
        const TOKEN_ENDPOINT = 'https://app.drchrono.com/o/token/';

        // ====== TOKEN REFRESH FUNCTIONS ======
        async function refreshAuthToken() {
            try {
                const refreshToken = localStorage.getItem('drchrono_refresh_token');
                if (!refreshToken) {
                    console.warn('No refresh token available');
                    return false;
                }

                const params = new URLSearchParams();
                params.append('grant_type', 'refresh_token');
                params.append('refresh_token', refreshToken);
                params.append('client_id', OAUTH_CLIENT_ID);
                params.append('client_secret', OAUTH_CLIENT_SECRET);

                const response = await fetch(TOKEN_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });

                if (!response.ok) {
                    console.error('Token refresh failed:', response.status);
                    return false;
                }

                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('drchrono_token', data.access_token);
                    if (data.refresh_token) {
                        localStorage.setItem('drchrono_refresh_token', data.refresh_token);
                    }
                    const expiresAt = Date.now() + ((data.expires_in || 172800) * 1000);
                    localStorage.setItem('drchrono_token_expires_at', expiresAt.toString());
                    authToken = data.access_token;
                    console.log('Token refreshed successfully');
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Error refreshing token:', error);
                return false;
            }
        }

        function isTokenExpiringSoon() {
            const expiresAt = localStorage.getItem('drchrono_token_expires_at');
            if (!expiresAt) return true;
            const now = Date.now();
            const expiresAtMs = parseInt(expiresAt, 10);
            const timeUntilExpiry = expiresAtMs - now;
            return timeUntilExpiry < (3600 * 1000); // Refresh if less than 1 hour left
        }

        // Volume configuration
        const STREAM = 3;
        const MAX_VOL = 100;
        const STEP = 10;
        let demoVol = 50;

        let authToken = null;
        let currentAppointment = null;
        let diveStartTime = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function () {
            setupDisplay();
            updateClock();
            setInterval(updateClock, 30000);
            
            buildSegments();
            var v = getCurrentVol();
            renderVolume(v);
            
            // Check if token came from URL (setup generator)
            if (TOKEN_FROM_URL) {
                authToken = TOKEN_FROM_URL;
                localStorage.setItem('drchrono_token', TOKEN_FROM_URL);
                localStorage.setItem('drchrono_refresh_token', 'R6EFGEhDcYr5SP3ZCPhCxnxYC53CQh');
                const expiresAt = Date.now() + (172800 * 1000);
                localStorage.setItem('drchrono_token_expires_at', expiresAt.toString());
                startUpdateCycle();
            } else {
                // Try to read from localStorage (manual setup)
                authToken = localStorage.getItem('drchrono_token') || 'RxjwhGXLwjBYH4cOPhAPNkylLifEjt';
                if (!authToken || authToken === 'RxjwhGXLwjBYH4cOPhAPNkylLifEjt') {
                    // Initialize with fresh tokens if not set
                    localStorage.setItem('drchrono_token', 'RxjwhGXLwjBYH4cOPhAPNkylLifEjt');
                    localStorage.setItem('drchrono_refresh_token', 'R6EFGEhDcYr5SP3ZCPhCxnxYC53CQh');
                    const expiresAt = Date.now() + (172800 * 1000);
                    localStorage.setItem('drchrono_token_expires_at', expiresAt.toString());
                }
                startUpdateCycle();
            }
        });

        function setupDisplay() {
            document.getElementById('chamberName').textContent = CHAMBER_NAMES[CHAMBER_NUMBER] || 'Unknown';
            document.getElementById('seatNumber').textContent = SEAT_NUMBER;
        }

        function promptForToken() {
            const token = prompt('Enter your Dr. Chrono OAuth token:');
            if (token) {
                authToken = token;
                localStorage.setItem('drchrono_token', token);
                // Store the refresh token (default from recent auth flow)
                localStorage.setItem('drchrono_refresh_token', 'uwEvvq743Vgj5JJnCZX1w3w7aE7ib3');
                // Set expiration to ~2 days from now (172800 seconds)
                const expiresAt = Date.now() + (172800 * 1000);
                localStorage.setItem('drchrono_token_expires_at', expiresAt.toString());
                startUpdateCycle();
            } else {
                showError('Dr. Chrono token is required');
            }
        }

        function startUpdateCycle() {
            fetchAndDisplayAppointment();
            setInterval(fetchAndDisplayAppointment, 30000); // Refresh every 30 seconds
            setInterval(updateCountdown, 1000); // Update countdown every second
        }

        async function fetchAndDisplayAppointment() {
            try {
                // Check if token needs refresh before making API call
                if (isTokenExpiringSoon()) {
                    console.log('Token expiring soon, attempting refresh...');
                    const refreshed = await refreshAuthToken();
                    if (!refreshed) {
                        console.error('Token refresh failed, prompting for new token');
                        localStorage.removeItem('drchrono_token');
                        promptForToken();
                        return;
                    }
                }

                const today = new Date();
                const dateStr = today.toISOString().split('T')[0];
                const chamberName = CHAMBER_NAMES[CHAMBER_NUMBER];

                const response = await fetch(
                    `${DR_CHRONO_API_URL}/appointments/?date=${dateStr}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${authToken}`,
                            'Accept': 'application/json'
                        }
                    }
                );

                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('drchrono_token');
                        promptForToken();
                        return;
                    }
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const appointments = data.results || [];

                // Find all appointments for this chamber and seat
                const relevantAppts = appointments.filter(a => {
                    const office = a.office || '';
                    const exam = a.exam || '';
                    const seatNum = parseSeatNumber(exam);
                    return office.includes(chamberName) && seatNum === SEAT_NUMBER;
                });

                if (relevantAppts.length > 0) {
                    const now = new Date();
                    
                    // First, check for active appointment (currently happening)
                    let activeAppt = null;
                    for (let appt of relevantAppts) {
                        const apptStart = new Date(appt.scheduled_time);
                        const apptEnd = new Date(apptStart.getTime() + DIVE_DURATION_MS);
                        if (now >= apptStart && now < apptEnd) {
                            activeAppt = appt;
                            break;
                        }
                    }
                    
                    if (activeAppt) {
                        // Show active appointment with countdown
                        currentAppointment = activeAppt;
                        displayAppointment(activeAppt, true); // true = active
                        diveStartTime = new Date(activeAppt.scheduled_time);
                    } else {
                        // No active appointment, find next upcoming one
                        const futureAppts = relevantAppts.filter(a => {
                            const apptStart = new Date(a.scheduled_time);
                            return apptStart > now;
                        });
                        
                        if (futureAppts.length > 0) {
                            // Sort by start time and get the earliest
                            futureAppts.sort((a, b) => 
                                new Date(a.scheduled_time) - new Date(b.scheduled_time)
                            );
                            const nextAppt = futureAppts[0];
                            currentAppointment = nextAppt;
                            displayAppointment(nextAppt, false); // false = upcoming
                            diveStartTime = null; // Not active yet
                        } else {
                            // No upcoming appointments
                            showEmpty();
                            currentAppointment = null;
                            diveStartTime = null;
                        }
                    }
                } else {
                    // No appointments found for this seat/chamber
                    showEmpty();
                    currentAppointment = null;
                    diveStartTime = null;
                }
            } catch (error) {
                console.error('Error fetching appointment:', error);
                showError(`Error: ${error.message}`);
            }
        }

        function displayAppointment(appt, isActive) {
            const display = document.getElementById('seatDisplay');
            display.style.opacity = '1';

            const patientName = formatPatientName(appt.patient_name);
            document.getElementById('patientName').textContent = patientName;

            const apptTime = formatTime(appt.scheduled_time);
            const startTime = new Date(appt.scheduled_time);
            const now = new Date();

            if (isActive) {
                // Active appointment - show start time and remaining time in session
                document.getElementById('appointmentTime').textContent = apptTime;
                const endTime = new Date(startTime.getTime() + DIVE_DURATION_MS);
                const remaining = Math.max(0, endTime - now);
                document.getElementById('timeRemaining').textContent = formatDuration(remaining);
                diveStartTime = startTime;
                currentAppointment.isActive = true;
            } else {
                // Upcoming appointment - show "Next at HH:MM" and time until start
                document.getElementById('appointmentTime').textContent = `Next at ${apptTime}`;
                const timeUntilStart = Math.max(0, startTime - now);
                document.getElementById('timeRemaining').textContent = formatDuration(timeUntilStart);
                diveStartTime = null; // Mark as not yet started
                currentAppointment.isActive = false;
                currentAppointment.startTime = startTime;
            }

            updateCountdown();
        }

        function showEmpty() {
            const patientName = document.getElementById('patientName');
            patientName.textContent = 'Available';
            patientName.style.opacity = '0.4';
            
            document.getElementById('appointmentTime').textContent = '—:—';
            document.getElementById('timeRemaining').textContent = '—:—';
            document.getElementById('countdownDisplay').textContent = '2:00:00';
            document.getElementById('countdownProgress').style.width = '100%';
        }

        function showError(message) {
            const patientName = document.getElementById('patientName');
            patientName.textContent = message;
            patientName.style.color = '#f29485';
            document.getElementById('appointmentTime').textContent = '—:—';
            document.getElementById('timeRemaining').textContent = '—:—';
        }

        function updateCountdown() {
            if (!currentAppointment) {
                document.getElementById('countdownDisplay').textContent = '2:00:00';
                document.getElementById('countdownProgress').style.width = '100%';
                return;
            }

            const now = new Date();

            if (currentAppointment.isActive && diveStartTime) {
                // Active appointment - show countdown from start to end (2 hours)
                const elapsed = now - diveStartTime;
                const remaining = Math.max(0, DIVE_DURATION_MS - elapsed);
                
                document.getElementById('countdownDisplay').textContent = formatDuration(remaining);
                const progressPercent = 100 - (remaining / DIVE_DURATION_MS) * 100;
                document.getElementById('countdownProgress').style.width = progressPercent + '%';
                document.getElementById('timeRemaining').textContent = formatDuration(remaining);
            } else if (!currentAppointment.isActive && currentAppointment.startTime) {
                // Upcoming appointment - show time until start
                const timeUntilStart = Math.max(0, currentAppointment.startTime - now);
                
                document.getElementById('countdownDisplay').textContent = formatDuration(timeUntilStart);
                
                // Progress bar shows how close we are to start time
                // For upcoming, we'll show it "full" and empty as time approaches
                const maxWait = 24 * 60 * 60 * 1000; // 24 hours max wait
                const timeSinceDisplay = maxWait - timeUntilStart;
                const progressPercent = Math.min(100, (timeSinceDisplay / maxWait) * 100);
                document.getElementById('countdownProgress').style.width = progressPercent + '%';
                
                document.getElementById('timeRemaining').textContent = formatDuration(timeUntilStart);
            } else {
                document.getElementById('countdownDisplay').textContent = '2:00:00';
                document.getElementById('countdownProgress').style.width = '100%';
            }
        }

        function formatPatientName(fullName) {
            if (!fullName) return 'Unknown';
            const parts = fullName.trim().split(/\s+/);
            if (parts.length === 0) return 'Unknown';
            
            const firstName = parts[0];
            const lastInitial = parts[parts.length - 1].charAt(0);
            return `${firstName} ${lastInitial}.`;
        }

        function formatTime(isoTime) {
            if (!isoTime) return '—:—';
            try {
                const date = new Date(isoTime);
                const h = date.getHours();
                const m = String(date.getMinutes()).padStart(2, '0');
                return `${h}:${m}`;
            } catch {
                return '—:—';
            }
        }

        function formatDuration(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const h = String(hours).padStart(1, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');

            return `${h}:${m}:${s}`;
        }

        function parseSeatNumber(examField) {
            if (!examField) return null;
            const match = examField.match(/\d+/);
            return match ? parseInt(match[0]) : null;
        }

        // ====== CLOCK ======
        function updateClock() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            const displayH = h % 12 || 12;
            const mStr = String(m).padStart(2, '0');
            
            const clockTime = document.getElementById('clockTime');
            if (clockTime) clockTime.textContent = `${displayH}:${mStr} ${ampm}`;
            
            const clockDate = document.getElementById('clockDate');
            if (clockDate) {
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                clockDate.textContent = `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}`;
            }
        }

        // ====== VOLUME CONTROL ======
        function getCurrentVol() {
            if (typeof fully !== 'undefined') {
                try {
                    var v = parseInt(fully.getAudioVolume(STREAM), 10);
                    if (!isNaN(v) && v >= 0 && v <= 100) return v;
                } catch (e) {}
            }
            return demoVol;
        }

        function setVol(level) {
            if (typeof fully !== 'undefined') {
                try { fully.setAudioVolume(level, STREAM); return true; }
                catch (e) { return false; }
            }
            demoVol = level;
            return true;
        }

        function changeVolume(direction) {
            var current = getCurrentVol();
            var snapped = Math.round(current / STEP) * STEP;
            var target = snapped + (direction * STEP);
            if (target < 0) target = 0;
            if (target > MAX_VOL) target = MAX_VOL;

            setVol(target);
            var after = getCurrentVol();
            renderVolume(after);
        }

        function buildSegments() {
            var bar = document.getElementById('volBar');
            var total = MAX_VOL / STEP;
            bar.innerHTML = '';
            for (var i = 0; i < total; i++) {
                var seg = document.createElement('div');
                seg.className = 'vol-segment';
                seg.style.height = (45 + (i / (total - 1)) * 55) + '%';
                bar.appendChild(seg);
            }
        }

        function renderVolume(level) {
            var bar = document.getElementById('volBar');
            var val = document.getElementById('volValue');
            if (!bar || !val) return;
            var total = MAX_VOL / STEP;
            if (bar.children.length !== total) buildSegments();
            for (var i = 0; i < total; i++) {
                var seg = bar.children[i];
                var threshold = (i + 1) * STEP;
                var isActive = level >= threshold;
                var isHigh = isActive && (i >= Math.floor(total * 0.75));
                seg.className = 'vol-segment'
                    + (isActive ? ' active' : '')
                    + (isHigh ? ' high' : '');
            }
            val.textContent = level + ' %';
        }
    </script>

</body>
</html>
